name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      force_auth_smoke:
        description: 'Run auth-smoke even if path filters do not match'
        required: false
        default: 'false'
      auth_smoke_modes:
        description: 'Auth smoke mode scope for manual runs'
        required: false
        default: 'both'
      auth_smoke_locales:
        description: 'Auth smoke locale scope for manual runs'
        required: false
        default: 'both'
      force_ai_schema_smoke:
        description: 'Run ai-schema-smoke even if path filters do not match'
        required: false
        default: 'false'
      ai_schema_smoke_locales:
        description: 'AI schema smoke locale scope for manual runs'
        required: false
        default: 'both'
      ai_schema_smoke_auth_modes:
        description: 'AI schema smoke auth mode scope for manual runs'
        required: false
        default: 'both'
      force_ai_render_smoke:
        description: 'Run ai-render-smoke even if path filters do not match'
        required: false
        default: 'false'
      ai_render_smoke_locales:
        description: 'AI render smoke locale scope for manual runs'
        required: false
        default: 'both'
      ai_render_smoke_auth_modes:
        description: 'AI render smoke auth mode scope for manual runs'
        required: false
        default: 'both'
      force_smoke_matrix:
        description: 'Run consolidated smoke matrix job (auth+ai, all modes/locales)'
        required: false
        default: 'false'
      smoke_matrix_auth_modes:
        description: 'Smoke matrix auth modes for manual run'
        required: false
        default: 'header,token'
      smoke_matrix_locales:
        description: 'Smoke matrix locales for manual run'
        required: false
        default: 'es-MX,en-US'

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      auth_related: ${{ steps.filter.outputs.auth_related }}
      ai_related: ${{ steps.filter.outputs.ai_related }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            auth_related:
              - 'src/core/auth/**'
              - 'src/core/observability/**'
              - 'src/modules/auth/**'
              - 'src/integration/**'
              - 'tools/ops/**'
              - '.github/workflows/**'
              - 'package.json'
              - 'package-lock.json'
            ai_related:
              - 'src/modules/ai/**'
              - 'src/integration/ai.integration.test.ts'
              - 'tools/ops/ai-schema-smoke-check.mjs'
              - 'tools/ops/ai-render-smoke-check.mjs'
              - '.github/workflows/**'
              - 'package.json'
              - 'package-lock.json'

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node and dependencies
        uses: ./.github/actions/setup-node-ci
        with:
          node-version: '20'

      - name: Run smoke contract preflight
        run: npm run smoke:matrix:contract | tee smoke-matrix-contract-output.log

      - name: Smoke contract preflight summary
        if: always()
        run: bash tools/ops/ci-smoke-summary.sh "Smoke matrix contract preflight" SMOKE_MATRIX_SUMMARY smoke-matrix-contract-output.log "MODE=contract-only"

      - name: Run quality checks
        run: npm run quality

      - name: Run ops helper tests
        run: npm run test:ops

      - name: Run quality helper tests
        run: npm run test:quality | tee quality-helper-tests-output.log

      - name: Quality helper tests summary
        if: always()
        run: |
          PASS_COUNT=$(grep -E 'pass [0-9]+' quality-helper-tests-output.log | tail -n 1 | awk '{print $3}' || true)
          FAIL_COUNT=$(grep -E 'fail [0-9]+' quality-helper-tests-output.log | tail -n 1 | awk '{print $3}' || true)
          if [ -z "$PASS_COUNT" ]; then PASS_COUNT=0; fi
          if [ -z "$FAIL_COUNT" ]; then FAIL_COUNT=0; fi

          SUMMARY_LINE=$(node tools/quality/quality-helper-summary-cli.mjs format "$PASS_COUNT" "$FAIL_COUNT")

          if ! PARSED_SUMMARY=$(node tools/quality/quality-helper-summary-cli.mjs parse "$SUMMARY_LINE"); then
            exit 1
          fi

          echo "$SUMMARY_LINE"

          bash tools/ops/ci-step-summary.sh "Quality helper tests" "$SUMMARY_LINE" "$PARSED_SUMMARY"

  auth-smoke:
    needs: changes
    if: |
      needs.changes.outputs.auth_related == 'true' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.force_auth_smoke == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      API_BASE_URL: http://127.0.0.1:3000
      SERVER_LOG_FILE: auth-smoke-server.log
      SERVER_PID_FILE: auth-smoke-server.pid
      SMOKE_OUTPUT_FILE: auth-smoke-output.log
      FAILURE_ARTIFACT_NAME: auth-smoke-server-log-${{ matrix.auth-mode }}-${{ matrix.locale }}
    strategy:
      fail-fast: false
      matrix:
        auth-mode: [header, token]
        locale: [es-MX, en-US]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Evaluate matrix selection
        id: scope
        run: bash tools/ops/ci-matrix-scope.sh "${{ github.event_name }}" "${{ github.event.inputs.auth_smoke_modes }}" "${{ github.event.inputs.auth_smoke_locales }}" "${{ matrix.auth-mode }}" "${{ matrix.locale }}" >> "$GITHUB_OUTPUT"

      - name: Setup Node and dependencies
        if: steps.scope.outputs.run_combo == 'true'
        uses: ./.github/actions/setup-node-ci
        with:
          node-version: '20'

      - name: Start API
        if: steps.scope.outputs.run_combo == 'true'
        env:
          AUTH_MODE: ${{ matrix.auth-mode }}
        run: bash tools/ops/ci-api-lifecycle.sh start "$AUTH_MODE" "$SERVER_LOG_FILE" "$SERVER_PID_FILE"

      - name: Wait for API readiness
        if: steps.scope.outputs.run_combo == 'true'
        run: bash tools/ops/ci-api-lifecycle.sh wait "$API_BASE_URL" 30 1

      - name: Run auth smoke check
        if: steps.scope.outputs.run_combo == 'true'
        env:
          AUTH_SMOKE_BASE_URL: ${{ env.API_BASE_URL }}
          AUTH_SMOKE_VERIFY_TOKEN_MODE: ${{ matrix.auth-mode == 'token' }}
          AUTH_SMOKE_LOCALE: ${{ matrix.locale }}
        run: npm run auth:smoke | tee "$SMOKE_OUTPUT_FILE"

      - name: Auth smoke summary
        if: always() && steps.scope.outputs.run_combo == 'true'
        env:
          AUTH_MODE_VALUE: ${{ matrix.auth-mode }}
          AUTH_SMOKE_LOCALE: ${{ matrix.locale }}
          AUTH_SMOKE_VERIFY_TOKEN_MODE: ${{ matrix.auth-mode == 'token' }}
          AUTH_SMOKE_BASE_URL: ${{ env.API_BASE_URL }}
        run: bash tools/ops/ci-smoke-summary.sh "Auth smoke (${AUTH_MODE_VALUE}, ${AUTH_SMOKE_LOCALE})" AUTH_SMOKE_SUMMARY "$SMOKE_OUTPUT_FILE" "AUTH_MODE=${AUTH_MODE_VALUE}" "AUTH_SMOKE_LOCALE=${AUTH_SMOKE_LOCALE}" "AUTH_SMOKE_BASE_URL=${AUTH_SMOKE_BASE_URL}" "AUTH_SMOKE_VERIFY_TOKEN_MODE=${AUTH_SMOKE_VERIFY_TOKEN_MODE}"

      - name: Stop API
        if: always() && steps.scope.outputs.run_combo == 'true'
        run: bash tools/ops/ci-api-lifecycle.sh stop "$SERVER_PID_FILE"

      - name: Upload API logs on failure
        if: failure() && steps.scope.outputs.run_combo == 'true'
        uses: ./.github/actions/upload-artifact
        with:
          name: ${{ env.FAILURE_ARTIFACT_NAME }}
          path: |
            ${{ env.SERVER_LOG_FILE }}
            ${{ env.SMOKE_OUTPUT_FILE }}

  ai-schema-smoke:
    needs: changes
    if: |
      needs.changes.outputs.ai_related == 'true' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.force_ai_schema_smoke == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      API_BASE_URL: http://127.0.0.1:3000
      SERVER_LOG_FILE: ai-schema-smoke-server.log
      SERVER_PID_FILE: ai-schema-smoke-server.pid
      SMOKE_OUTPUT_FILE: ai-schema-smoke-output.log
      FAILURE_ARTIFACT_NAME: ai-schema-smoke-server-log-${{ matrix.auth-mode }}-${{ matrix.locale }}
    strategy:
      fail-fast: false
      matrix:
        auth-mode: [header, token]
        locale: [es-MX, en-US]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Evaluate matrix selection
        id: scope
        run: bash tools/ops/ci-matrix-scope.sh "${{ github.event_name }}" "${{ github.event.inputs.ai_schema_smoke_auth_modes }}" "${{ github.event.inputs.ai_schema_smoke_locales }}" "${{ matrix.auth-mode }}" "${{ matrix.locale }}" >> "$GITHUB_OUTPUT"

      - name: Setup Node and dependencies
        if: steps.scope.outputs.run_combo == 'true'
        uses: ./.github/actions/setup-node-ci
        with:
          node-version: '20'

      - name: Start API
        if: steps.scope.outputs.run_combo == 'true'
        env:
          AUTH_MODE: ${{ matrix.auth-mode }}
        run: bash tools/ops/ci-api-lifecycle.sh start "$AUTH_MODE" "$SERVER_LOG_FILE" "$SERVER_PID_FILE"

      - name: Wait for API readiness
        if: steps.scope.outputs.run_combo == 'true'
        run: bash tools/ops/ci-api-lifecycle.sh wait "$API_BASE_URL" 30 1

      - name: Run AI schema smoke check
        if: steps.scope.outputs.run_combo == 'true'
        env:
          AI_SCHEMA_SMOKE_BASE_URL: ${{ env.API_BASE_URL }}
          AI_SCHEMA_SMOKE_LOCALE: ${{ matrix.locale }}
          AI_SCHEMA_SMOKE_AUTH_MODE: ${{ matrix.auth-mode }}
          AI_SCHEMA_SMOKE_EXPECTED_SCHEMA_VERSION: ai-proposal.v1
        run: npm run ai:schema:smoke | tee "$SMOKE_OUTPUT_FILE"

      - name: AI schema smoke summary
        if: always() && steps.scope.outputs.run_combo == 'true'
        env:
          AI_SCHEMA_SMOKE_AUTH_MODE: ${{ matrix.auth-mode }}
          AI_SCHEMA_SMOKE_LOCALE: ${{ matrix.locale }}
          AI_SCHEMA_SMOKE_BASE_URL: ${{ env.API_BASE_URL }}
          AI_SCHEMA_SMOKE_EXPECTED_SCHEMA_VERSION: ai-proposal.v1
        run: bash tools/ops/ci-smoke-summary.sh "AI schema smoke (${AI_SCHEMA_SMOKE_AUTH_MODE}, ${AI_SCHEMA_SMOKE_LOCALE})" AI_SCHEMA_SMOKE_SUMMARY "$SMOKE_OUTPUT_FILE" "AI_SCHEMA_SMOKE_AUTH_MODE=${AI_SCHEMA_SMOKE_AUTH_MODE}" "AI_SCHEMA_SMOKE_BASE_URL=${AI_SCHEMA_SMOKE_BASE_URL}" "AI_SCHEMA_SMOKE_LOCALE=${AI_SCHEMA_SMOKE_LOCALE}" "AI_SCHEMA_SMOKE_EXPECTED_SCHEMA_VERSION=${AI_SCHEMA_SMOKE_EXPECTED_SCHEMA_VERSION}"

      - name: Stop API
        if: always() && steps.scope.outputs.run_combo == 'true'
        run: bash tools/ops/ci-api-lifecycle.sh stop "$SERVER_PID_FILE"

      - name: Upload API logs on failure
        if: failure() && steps.scope.outputs.run_combo == 'true'
        uses: ./.github/actions/upload-artifact
        with:
          name: ${{ env.FAILURE_ARTIFACT_NAME }}
          path: |
            ${{ env.SERVER_LOG_FILE }}
            ${{ env.SMOKE_OUTPUT_FILE }}

  ai-render-smoke:
    needs: changes
    if: |
      needs.changes.outputs.ai_related == 'true' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.force_ai_render_smoke == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      API_BASE_URL: http://127.0.0.1:3000
      SERVER_LOG_FILE: ai-render-smoke-server.log
      SERVER_PID_FILE: ai-render-smoke-server.pid
      SMOKE_OUTPUT_FILE: ai-render-smoke-output.log
      FAILURE_ARTIFACT_NAME: ai-render-smoke-server-log-${{ matrix.auth-mode }}-${{ matrix.locale }}
    strategy:
      fail-fast: false
      matrix:
        auth-mode: [header, token]
        locale: [es-MX, en-US]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Evaluate matrix selection
        id: scope
        run: bash tools/ops/ci-matrix-scope.sh "${{ github.event_name }}" "${{ github.event.inputs.ai_render_smoke_auth_modes }}" "${{ github.event.inputs.ai_render_smoke_locales }}" "${{ matrix.auth-mode }}" "${{ matrix.locale }}" >> "$GITHUB_OUTPUT"

      - name: Setup Node and dependencies
        if: steps.scope.outputs.run_combo == 'true'
        uses: ./.github/actions/setup-node-ci
        with:
          node-version: '20'

      - name: Start API
        if: steps.scope.outputs.run_combo == 'true'
        env:
          AUTH_MODE: ${{ matrix.auth-mode }}
        run: bash tools/ops/ci-api-lifecycle.sh start "$AUTH_MODE" "$SERVER_LOG_FILE" "$SERVER_PID_FILE"

      - name: Wait for API readiness
        if: steps.scope.outputs.run_combo == 'true'
        run: bash tools/ops/ci-api-lifecycle.sh wait "$API_BASE_URL" 30 1

      - name: Run AI render smoke check
        if: steps.scope.outputs.run_combo == 'true'
        env:
          AI_RENDER_SMOKE_BASE_URL: ${{ env.API_BASE_URL }}
          AI_RENDER_SMOKE_LOCALE: ${{ matrix.locale }}
          AI_RENDER_SMOKE_AUTH_MODE: ${{ matrix.auth-mode }}
        run: npm run ai:render:smoke | tee "$SMOKE_OUTPUT_FILE"

      - name: AI render smoke summary
        if: always() && steps.scope.outputs.run_combo == 'true'
        env:
          AI_RENDER_SMOKE_AUTH_MODE: ${{ matrix.auth-mode }}
          AI_RENDER_SMOKE_LOCALE: ${{ matrix.locale }}
          AI_RENDER_SMOKE_BASE_URL: ${{ env.API_BASE_URL }}
        run: bash tools/ops/ci-smoke-summary.sh "AI render smoke (${AI_RENDER_SMOKE_AUTH_MODE}, ${AI_RENDER_SMOKE_LOCALE})" AI_RENDER_SMOKE_SUMMARY "$SMOKE_OUTPUT_FILE" "AI_RENDER_SMOKE_AUTH_MODE=${AI_RENDER_SMOKE_AUTH_MODE}" "AI_RENDER_SMOKE_BASE_URL=${AI_RENDER_SMOKE_BASE_URL}" "AI_RENDER_SMOKE_LOCALE=${AI_RENDER_SMOKE_LOCALE}"

      - name: Stop API
        if: always() && steps.scope.outputs.run_combo == 'true'
        run: bash tools/ops/ci-api-lifecycle.sh stop "$SERVER_PID_FILE"

      - name: Upload API logs on failure
        if: failure() && steps.scope.outputs.run_combo == 'true'
        uses: ./.github/actions/upload-artifact
        with:
          name: ${{ env.FAILURE_ARTIFACT_NAME }}
          path: |
            ${{ env.SERVER_LOG_FILE }}
            ${{ env.SMOKE_OUTPUT_FILE }}

  smoke-matrix:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.force_smoke_matrix == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node and dependencies
        uses: ./.github/actions/setup-node-ci
        with:
          node-version: '20'

      - name: Run smoke matrix with JSON export
        env:
          SMOKE_MATRIX_AUTH_MODES: ${{ github.event.inputs.smoke_matrix_auth_modes }}
          SMOKE_MATRIX_LOCALES: ${{ github.event.inputs.smoke_matrix_locales }}
        run: npm run smoke:matrix:json | tee smoke-matrix-output.log

      - name: Smoke matrix summary
        if: always()
        run: bash tools/ops/ci-smoke-summary.sh "Smoke matrix" SMOKE_MATRIX_SUMMARY smoke-matrix-output.log

      - name: Upload smoke matrix summary artifact
        if: always()
        uses: ./.github/actions/upload-artifact
        with:
          name: smoke-matrix-summary
          path: |
            tmp/smoke-matrix-summary.json
            smoke-matrix-output.log
