name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      force_auth_smoke:
        description: 'Run auth-smoke even if path filters do not match'
        required: false
        default: 'false'
      auth_smoke_modes:
        description: 'Auth smoke mode scope for manual runs'
        required: false
        default: 'both'
      auth_smoke_locales:
        description: 'Auth smoke locale scope for manual runs'
        required: false
        default: 'both'
      force_ai_schema_smoke:
        description: 'Run ai-schema-smoke even if path filters do not match'
        required: false
        default: 'false'
      ai_schema_smoke_locales:
        description: 'AI schema smoke locale scope for manual runs'
        required: false
        default: 'both'
      ai_schema_smoke_auth_modes:
        description: 'AI schema smoke auth mode scope for manual runs'
        required: false
        default: 'both'
      force_ai_render_smoke:
        description: 'Run ai-render-smoke even if path filters do not match'
        required: false
        default: 'false'
      ai_render_smoke_locales:
        description: 'AI render smoke locale scope for manual runs'
        required: false
        default: 'both'
      ai_render_smoke_auth_modes:
        description: 'AI render smoke auth mode scope for manual runs'
        required: false
        default: 'both'
      force_smoke_matrix:
        description: 'Run consolidated smoke matrix job (auth+ai, all modes/locales)'
        required: false
        default: 'false'
      smoke_matrix_auth_modes:
        description: 'Smoke matrix auth modes for manual run'
        required: false
        default: 'header,token'
      smoke_matrix_locales:
        description: 'Smoke matrix locales for manual run'
        required: false
        default: 'es-MX,en-US'

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      auth_related: ${{ steps.filter.outputs.auth_related }}
      ai_related: ${{ steps.filter.outputs.ai_related }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            auth_related:
              - 'src/core/auth/**'
              - 'src/core/observability/**'
              - 'src/modules/auth/**'
              - 'src/integration/**'
              - 'tools/ops/**'
              - '.github/workflows/**'
              - 'package.json'
              - 'package-lock.json'
            ai_related:
              - 'src/modules/ai/**'
              - 'src/integration/ai.integration.test.ts'
              - 'tools/ops/ai-schema-smoke-check.mjs'
              - 'tools/ops/ai-render-smoke-check.mjs'
              - '.github/workflows/**'
              - 'package.json'
              - 'package-lock.json'

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run quality checks
        run: npm run quality

      - name: Run ops helper tests
        run: npm run test:ops

      - name: Run quality helper tests
        run: npm run test:quality | tee quality-helper-tests-output.log

      - name: Quality helper tests summary
        if: always()
        run: |
          PASS_COUNT=$(grep -E 'pass [0-9]+' quality-helper-tests-output.log | tail -n 1 | awk '{print $3}' || true)
          FAIL_COUNT=$(grep -E 'fail [0-9]+' quality-helper-tests-output.log | tail -n 1 | awk '{print $3}' || true)
          if [ -z "$PASS_COUNT" ]; then PASS_COUNT=0; fi
          if [ -z "$FAIL_COUNT" ]; then FAIL_COUNT=0; fi

          SUMMARY_LINE=$(PASS_COUNT="$PASS_COUNT" FAIL_COUNT="$FAIL_COUNT" node --input-type=module -e "import { QUALITY_HELPER_TESTS_SUMMARY_PREFIX, formatQualitySummaryLine } from './tools/quality/quality-summary-helpers.mjs'; console.log(formatQualitySummaryLine(QUALITY_HELPER_TESTS_SUMMARY_PREFIX, { pass: Number(process.env.PASS_COUNT), fail: Number(process.env.FAIL_COUNT) }));")
          echo "$SUMMARY_LINE"

          {
            echo "### Quality helper tests"
            echo ""
            echo "- ${SUMMARY_LINE}"
          } >> "$GITHUB_STEP_SUMMARY"

  auth-smoke:
    needs: changes
    if: |
      needs.changes.outputs.auth_related == 'true' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.force_auth_smoke == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        auth-mode: [header, token]
        locale: [es-MX, en-US]

    steps:
      - name: Evaluate matrix selection
        id: scope
        run: |
          RUN_COMBO=true
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.auth_smoke_modes }}" != "both" ] && [ "${{ github.event.inputs.auth_smoke_modes }}" != "${{ matrix.auth-mode }}" ]; then
              RUN_COMBO=false
            fi
            if [ "${{ github.event.inputs.auth_smoke_locales }}" != "both" ] && [ "${{ github.event.inputs.auth_smoke_locales }}" != "${{ matrix.locale }}" ]; then
              RUN_COMBO=false
            fi
          fi

          echo "run_combo=${RUN_COMBO}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.scope.outputs.run_combo == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.scope.outputs.run_combo == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        if: steps.scope.outputs.run_combo == 'true'
        run: npm install

      - name: Start API
        if: steps.scope.outputs.run_combo == 'true'
        env:
          AUTH_MODE: ${{ matrix.auth-mode }}
        run: |
          npm run dev:api > auth-smoke-server.log 2>&1 &
          echo $! > auth-smoke-server.pid

      - name: Wait for API readiness
        if: steps.scope.outputs.run_combo == 'true'
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "API did not become ready in time"
          exit 1

      - name: Run auth smoke check
        if: steps.scope.outputs.run_combo == 'true'
        env:
          AUTH_SMOKE_BASE_URL: http://127.0.0.1:3000
          AUTH_SMOKE_VERIFY_TOKEN_MODE: ${{ matrix.auth-mode == 'token' }}
          AUTH_SMOKE_LOCALE: ${{ matrix.locale }}
        run: npm run auth:smoke | tee auth-smoke-output.log

      - name: Auth smoke summary
        if: always() && steps.scope.outputs.run_combo == 'true'
        env:
          AUTH_MODE_VALUE: ${{ matrix.auth-mode }}
          AUTH_SMOKE_LOCALE: ${{ matrix.locale }}
          AUTH_SMOKE_VERIFY_TOKEN_MODE: ${{ matrix.auth-mode == 'token' }}
          AUTH_SMOKE_BASE_URL: http://127.0.0.1:3000
        run: |
          SUMMARY_LINE=$(grep 'AUTH_SMOKE_SUMMARY ' auth-smoke-output.log | tail -n 1 || true)
          if [ -z "$SUMMARY_LINE" ]; then
            echo "AUTH_SMOKE_SUMMARY line not found in output"
            exit 1
          fi

          echo "Auth smoke run summary"
          echo "- AUTH_MODE=${AUTH_MODE_VALUE}"
          echo "- AUTH_SMOKE_LOCALE=${AUTH_SMOKE_LOCALE}"
          echo "- AUTH_SMOKE_BASE_URL=${AUTH_SMOKE_BASE_URL}"
          echo "- AUTH_SMOKE_VERIFY_TOKEN_MODE=${AUTH_SMOKE_VERIFY_TOKEN_MODE}"
          echo "- ${SUMMARY_LINE}"

          {
            echo "### Auth smoke (${AUTH_MODE_VALUE}, ${AUTH_SMOKE_LOCALE})"
            echo ""
            echo "- ${SUMMARY_LINE}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stop API
        if: always() && steps.scope.outputs.run_combo == 'true'
        run: |
          if [ -f auth-smoke-server.pid ]; then
            kill "$(cat auth-smoke-server.pid)" || true
          fi

      - name: Upload API logs on failure
        if: failure() && steps.scope.outputs.run_combo == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: auth-smoke-server-log-${{ matrix.auth-mode }}-${{ matrix.locale }}
          path: |
            auth-smoke-server.log
            auth-smoke-output.log

  ai-schema-smoke:
    needs: changes
    if: |
      needs.changes.outputs.ai_related == 'true' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.force_ai_schema_smoke == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        auth-mode: [header, token]
        locale: [es-MX, en-US]

    steps:
      - name: Evaluate matrix selection
        id: scope
        run: |
          RUN_COMBO=true
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.ai_schema_smoke_auth_modes }}" != "both" ] && [ "${{ github.event.inputs.ai_schema_smoke_auth_modes }}" != "${{ matrix.auth-mode }}" ]; then
              RUN_COMBO=false
            fi
            if [ "${{ github.event.inputs.ai_schema_smoke_locales }}" != "both" ] && [ "${{ github.event.inputs.ai_schema_smoke_locales }}" != "${{ matrix.locale }}" ]; then
              RUN_COMBO=false
            fi
          fi

          echo "run_combo=${RUN_COMBO}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.scope.outputs.run_combo == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.scope.outputs.run_combo == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        if: steps.scope.outputs.run_combo == 'true'
        run: npm install

      - name: Start API
        if: steps.scope.outputs.run_combo == 'true'
        env:
          AUTH_MODE: ${{ matrix.auth-mode }}
        run: |
          npm run dev:api > ai-schema-smoke-server.log 2>&1 &
          echo $! > ai-schema-smoke-server.pid

      - name: Wait for API readiness
        if: steps.scope.outputs.run_combo == 'true'
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "API did not become ready in time"
          exit 1

      - name: Run AI schema smoke check
        if: steps.scope.outputs.run_combo == 'true'
        env:
          AI_SCHEMA_SMOKE_BASE_URL: http://127.0.0.1:3000
          AI_SCHEMA_SMOKE_LOCALE: ${{ matrix.locale }}
          AI_SCHEMA_SMOKE_AUTH_MODE: ${{ matrix.auth-mode }}
          AI_SCHEMA_SMOKE_EXPECTED_SCHEMA_VERSION: ai-proposal.v1
        run: npm run ai:schema:smoke | tee ai-schema-smoke-output.log

      - name: AI schema smoke summary
        if: always() && steps.scope.outputs.run_combo == 'true'
        env:
          AI_SCHEMA_SMOKE_AUTH_MODE: ${{ matrix.auth-mode }}
          AI_SCHEMA_SMOKE_LOCALE: ${{ matrix.locale }}
          AI_SCHEMA_SMOKE_BASE_URL: http://127.0.0.1:3000
          AI_SCHEMA_SMOKE_EXPECTED_SCHEMA_VERSION: ai-proposal.v1
        run: |
          SUMMARY_LINE=$(grep 'AI_SCHEMA_SMOKE_SUMMARY ' ai-schema-smoke-output.log | tail -n 1 || true)
          if [ -z "$SUMMARY_LINE" ]; then
            echo "AI_SCHEMA_SMOKE_SUMMARY line not found in output"
            exit 1
          fi

          echo "AI schema smoke run summary"
          echo "- AI_SCHEMA_SMOKE_AUTH_MODE=${AI_SCHEMA_SMOKE_AUTH_MODE}"
          echo "- AI_SCHEMA_SMOKE_BASE_URL=${AI_SCHEMA_SMOKE_BASE_URL}"
          echo "- AI_SCHEMA_SMOKE_LOCALE=${AI_SCHEMA_SMOKE_LOCALE}"
          echo "- AI_SCHEMA_SMOKE_EXPECTED_SCHEMA_VERSION=${AI_SCHEMA_SMOKE_EXPECTED_SCHEMA_VERSION}"
          echo "- ${SUMMARY_LINE}"

          {
            echo "### AI schema smoke (${AI_SCHEMA_SMOKE_AUTH_MODE}, ${AI_SCHEMA_SMOKE_LOCALE})"
            echo ""
            echo "- ${SUMMARY_LINE}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stop API
        if: always() && steps.scope.outputs.run_combo == 'true'
        run: |
          if [ -f ai-schema-smoke-server.pid ]; then
            kill "$(cat ai-schema-smoke-server.pid)" || true
          fi

      - name: Upload API logs on failure
        if: failure() && steps.scope.outputs.run_combo == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ai-schema-smoke-server-log-${{ matrix.auth-mode }}-${{ matrix.locale }}
          path: |
            ai-schema-smoke-server.log
            ai-schema-smoke-output.log

  ai-render-smoke:
    needs: changes
    if: |
      needs.changes.outputs.ai_related == 'true' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.force_ai_render_smoke == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        auth-mode: [header, token]
        locale: [es-MX, en-US]

    steps:
      - name: Evaluate matrix selection
        id: scope
        run: |
          RUN_COMBO=true
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.ai_render_smoke_auth_modes }}" != "both" ] && [ "${{ github.event.inputs.ai_render_smoke_auth_modes }}" != "${{ matrix.auth-mode }}" ]; then
              RUN_COMBO=false
            fi
            if [ "${{ github.event.inputs.ai_render_smoke_locales }}" != "both" ] && [ "${{ github.event.inputs.ai_render_smoke_locales }}" != "${{ matrix.locale }}" ]; then
              RUN_COMBO=false
            fi
          fi

          echo "run_combo=${RUN_COMBO}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.scope.outputs.run_combo == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.scope.outputs.run_combo == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        if: steps.scope.outputs.run_combo == 'true'
        run: npm install

      - name: Start API
        if: steps.scope.outputs.run_combo == 'true'
        env:
          AUTH_MODE: ${{ matrix.auth-mode }}
        run: |
          npm run dev:api > ai-render-smoke-server.log 2>&1 &
          echo $! > ai-render-smoke-server.pid

      - name: Wait for API readiness
        if: steps.scope.outputs.run_combo == 'true'
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "API did not become ready in time"
          exit 1

      - name: Run AI render smoke check
        if: steps.scope.outputs.run_combo == 'true'
        env:
          AI_RENDER_SMOKE_BASE_URL: http://127.0.0.1:3000
          AI_RENDER_SMOKE_LOCALE: ${{ matrix.locale }}
          AI_RENDER_SMOKE_AUTH_MODE: ${{ matrix.auth-mode }}
        run: npm run ai:render:smoke | tee ai-render-smoke-output.log

      - name: AI render smoke summary
        if: always() && steps.scope.outputs.run_combo == 'true'
        env:
          AI_RENDER_SMOKE_AUTH_MODE: ${{ matrix.auth-mode }}
          AI_RENDER_SMOKE_LOCALE: ${{ matrix.locale }}
          AI_RENDER_SMOKE_BASE_URL: http://127.0.0.1:3000
        run: |
          SUMMARY_LINE=$(grep 'AI_RENDER_SMOKE_SUMMARY ' ai-render-smoke-output.log | tail -n 1 || true)
          if [ -z "$SUMMARY_LINE" ]; then
            echo "AI_RENDER_SMOKE_SUMMARY line not found in output"
            exit 1
          fi

          echo "AI render smoke run summary"
          echo "- AI_RENDER_SMOKE_AUTH_MODE=${AI_RENDER_SMOKE_AUTH_MODE}"
          echo "- AI_RENDER_SMOKE_BASE_URL=${AI_RENDER_SMOKE_BASE_URL}"
          echo "- AI_RENDER_SMOKE_LOCALE=${AI_RENDER_SMOKE_LOCALE}"
          echo "- ${SUMMARY_LINE}"

          {
            echo "### AI render smoke (${AI_RENDER_SMOKE_AUTH_MODE}, ${AI_RENDER_SMOKE_LOCALE})"
            echo ""
            echo "- ${SUMMARY_LINE}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stop API
        if: always() && steps.scope.outputs.run_combo == 'true'
        run: |
          if [ -f ai-render-smoke-server.pid ]; then
            kill "$(cat ai-render-smoke-server.pid)" || true
          fi

      - name: Upload API logs on failure
        if: failure() && steps.scope.outputs.run_combo == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ai-render-smoke-server-log-${{ matrix.auth-mode }}-${{ matrix.locale }}
          path: |
            ai-render-smoke-server.log
            ai-render-smoke-output.log

  smoke-matrix:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.force_smoke_matrix == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run smoke matrix with JSON export
        env:
          SMOKE_MATRIX_AUTH_MODES: ${{ github.event.inputs.smoke_matrix_auth_modes }}
          SMOKE_MATRIX_LOCALES: ${{ github.event.inputs.smoke_matrix_locales }}
        run: npm run smoke:matrix:json | tee smoke-matrix-output.log

      - name: Smoke matrix summary
        if: always()
        run: |
          SUMMARY_LINE=$(grep 'SMOKE_MATRIX_SUMMARY ' smoke-matrix-output.log | tail -n 1 || true)
          if [ -z "$SUMMARY_LINE" ]; then
            echo "SMOKE_MATRIX_SUMMARY line not found in output"
            exit 1
          fi

          echo "Smoke matrix run summary"
          echo "- ${SUMMARY_LINE}"

          {
            echo "### Smoke matrix"
            echo ""
            echo "- ${SUMMARY_LINE}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload smoke matrix summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-matrix-summary
          path: |
            tmp/smoke-matrix-summary.json
            smoke-matrix-output.log
