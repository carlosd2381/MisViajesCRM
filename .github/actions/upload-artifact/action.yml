name: Upload Artifact
description: Upload CI artifacts with a local reusable wrapper
inputs:
  name:
    description: Artifact name
    required: true
  path:
    description: Newline-separated file paths or glob patterns to upload
    required: true
  if-no-files-found:
    description: Behavior when no files are found
    required: false
    default: warn
runs:
  using: composite
  steps:
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
        if-no-files-found: ${{ inputs.if-no-files-found }}
