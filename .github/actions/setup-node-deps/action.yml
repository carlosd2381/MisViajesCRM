name: Setup Node + dependencies
description: Setup Node.js runtime and install npm dependencies
inputs:
  node-version:
    description: Node.js version to use
    required: false
    default: '20'
runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
    - name: Install dependencies
      shell: bash
      run: npm install
